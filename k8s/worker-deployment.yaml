apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: mergesignal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: mergesignal/worker:latest
        envFrom:
        - configMapRef:
            name: mergesignal-config
        - secretRef:
            name: mergesignal-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
