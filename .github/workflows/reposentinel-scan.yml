name: RepoSentinel scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fail_above:
        description: "Fail if totalScore > this value (0..100). Leave empty to not fail."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: reposentinel-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack install

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build engine + CLI
        run: |
          set -euo pipefail
          pnpm -C packages/shared build
          pnpm -C packages/engine-stub build
          pnpm -C packages/engine build
          pnpm -C apps/cli build

      - name: Run RepoSentinel scan
        env:
          FAIL_ABOVE: ${{ inputs.fail_above }}
        run: |
          set -euo pipefail
          echo "Running local scan for $GITHUB_REPOSITORY"
          node apps/cli/dist/cli.js scan --repo-id "$GITHUB_REPOSITORY" --out reposentinel-scan.json --json > reposentinel-scan.pretty.json
          if [ -n "${FAIL_ABOVE:-}" ]; then
            node apps/cli/dist/cli.js scan --repo-id "$GITHUB_REPOSITORY" --fail-above "${FAIL_ABOVE}"
          fi

      - name: Summary
        run: |
          node -e '
          const fs = require("fs");
          const r = JSON.parse(fs.readFileSync("reposentinel-scan.json","utf8"));
          const total = r.totalScore ?? null;
          const conf = r.confidence ?? "n/a";
          const method = r.methodologyVersion ?? "n/a";
          const layers = r.layerScores ?? {};
          const recs = Array.isArray(r.recommendations) ? r.recommendations : [];
          const reasons = Array.isArray(r.explain?.reasons) ? r.explain.reasons : [];
          const gi = r.graphInsights ?? {};
          const hotspots = Array.isArray(gi.hotspots) ? gi.hotspots : [];
          const deepest = Array.isArray(gi.deepest) ? gi.deepest : [];
          const vulnerable = Array.isArray(gi.vulnerable) ? gi.vulnerable : [];
          const lines = [];
          lines.push("## RepoSentinel scan");
          lines.push("");
          lines.push(`- Repo: \`${process.env.GITHUB_REPOSITORY}\``);
          lines.push(`- Method: \`${method}\` • Confidence: \`${conf}\``);
          lines.push(`- Total score: **${total ?? "n/a"}** (0 best → 100 worst)`);
          lines.push(`- Layers: security=${layers.security ?? "n/a"}, maintainability=${layers.maintainability ?? "n/a"}, ecosystem=${layers.ecosystem ?? "n/a"}, upgradeImpact=${layers.upgradeImpact ?? "n/a"}`);
          if (reasons.length) {
            lines.push("");
            lines.push("### Why this is risky (top drivers)");
            for (const x of reasons.slice(0, 8)) {
              const title = String(x.title ?? x.reason ?? "Reason");
              const detail = x.detail ? String(x.detail) : "";
              lines.push(`- ${title}${detail ? ` — ${detail}` : ""}`);
            }
          }
          if (hotspots.length) {
            lines.push("");
            lines.push("### Transitive hotspots (high fan-in)");
            for (const h of hotspots.slice(0, 5)) {
              const name = String(h.packageName ?? "package");
              const fanIn = h.fanIn ?? "n/a";
              const via = Array.isArray(h.via) && h.via.length ? ` via ${h.via.join(" → ")}` : "";
              lines.push(`- \`${name}\` fan-in ${fanIn}${via}`);
            }
          }
          if (vulnerable.length) {
            lines.push("");
            lines.push("### Vulnerable packages (evidence-backed)");
            for (const v of vulnerable.slice(0, 5)) {
              const name = String(v.packageName ?? "package");
              const count = v.advisoryCount ?? "n/a";
              const via = Array.isArray(v.via) && v.via.length ? ` via ${v.via.join(" → ")}` : "";
              lines.push(`- \`${name}\` advisories ${count}${via}`);
            }
          }
          if (deepest.length) {
            lines.push("");
            lines.push("### Deepest transitive dependencies");
            for (const d of deepest.slice(0, 5)) {
              const name = String(d.packageName ?? "package");
              const depth = d.depth ?? "n/a";
              const via = Array.isArray(d.via) && d.via.length ? ` via ${d.via.join(" → ")}` : "";
              lines.push(`- \`${name}\` depth ${depth}${via}`);
            }
          }
          if (recs.length) {
            lines.push("");
            lines.push("### Top recommendations (actionable)");
            for (const x of recs.slice(0, 6)) {
              const title = String(x.title ?? "Untitled");
              const prio = Number(x.priorityScore ?? 0);
              const pkgs = Array.isArray(x.packages) ? x.packages.slice(0, 6) : [];
              lines.push(`- ${title} (priority ${prio})${pkgs.length ? ` — ${pkgs.map((p) => `\`${p}\``).join(", ")}` : ""}`);
            }
          }
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
          '

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: reposentinel-scan
          path: |
            reposentinel-scan.json
            reposentinel-scan.pretty.json
          if-no-files-found: error

