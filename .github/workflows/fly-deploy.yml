# Deploy web + API to Fly.io (avoids corporate TLS issues on laptops).
#
# GitHub Actions secrets (one per Fly app-scoped deploy token):
#   FLY_API_TOKEN_MERGESIGNAL_WEB
#   FLY_API_TOKEN_MERGESIGNAL_API
# Settings → Secrets and variables → Actions

name: Deploy Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fly-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy web
        run: |
          for attempt in 1 2 3; do
            echo "flyctl deploy attempt $attempt/3"
            if flyctl deploy . --config apps/web/fly.toml --dockerfile apps/web/Dockerfile --depot=false; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy failed (e.g. transient network to api.machines.dev); retrying in 30s..."
              sleep 30
            fi
          done
          echo "All deploy attempts failed"
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_MERGESIGNAL_WEB }}

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        run: |
          for attempt in 1 2 3; do
            echo "flyctl deploy attempt $attempt/3"
            if flyctl deploy . --config apps/api/fly.toml --dockerfile apps/api/Dockerfile --depot=false; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy failed (e.g. transient network to api.machines.dev); retrying in 30s..."
              sleep 30
            fi
          done
          echo "All deploy attempts failed"
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_MERGESIGNAL_API }}
