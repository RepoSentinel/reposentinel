name: MergeSignal scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fail_above:
        description: "Fail if totalScore > this value (0..100). Leave empty to not fail."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: mergesignal-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack install

      - name: Get pnpm store path
        id: pnpm-store
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "path=$(pnpm store path --silent 2>/dev/null)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Build engine + CLI
        run: |
          set -euo pipefail
          # @mergesignal/shared must be built first (exports point at dist/*.js).
          pnpm turbo run build --filter=@mergesignal/cli...

      - name: Run MergeSignal scan
        env:
          FAIL_ABOVE: ${{ inputs.fail_above }}
        run: |
          set -euo pipefail
          echo "Running local scan for $GITHUB_REPOSITORY"
          node apps/cli/dist/cli.js scan --repo-id "$GITHUB_REPOSITORY" --out mergesignal-scan.json --json > mergesignal-scan.pretty.json
          if [ -n "${FAIL_ABOVE:-}" ]; then
            node apps/cli/dist/cli.js scan --repo-id "$GITHUB_REPOSITORY" --fail-above "${FAIL_ABOVE}"
          fi

      - name: Summary
        run: |
          node -e '
          const fs = require("fs");
          const r = JSON.parse(fs.readFileSync("mergesignal-scan.json","utf8"));
          const total = r.totalScore ?? null;
          const layers = r.layerScores ?? {};
          const recs = Array.isArray(r.recommendations) ? r.recommendations : [];
          const gi = r.graphInsights ?? {};

          // Determine risk status
          function getRiskStatus(score) {
            if (score === null) return { emoji: "⚪", label: "Unknown risk" };
            if (score >= 70) return { emoji: "🔴", label: "High risk" };
            if (score >= 40) return { emoji: "⚠️", label: "Medium risk" };
            return { emoji: "✅", label: "Low risk" };
          }

          // Map impact to priority emoji and time estimate
          function getActionMeta(rec) {
            const impact = rec.impact ?? "low";
            const prio = Number(rec.priorityScore ?? 0);
            if (impact === "high" || prio >= 80) return { icon: "🔴", time: "< 5 min" };
            if (impact === "medium" || prio >= 50) return { icon: "⚠️", time: "~15 min" };
            return { icon: "ℹ️", time: "~30 min" };
          }

          // Format layer score with status
          function formatLayerStatus(score) {
            if (score === null || score === undefined) return "—";
            return score < 20 ? `${score} ✅` : score < 40 ? `${score} ⚠️` : `${score} 🔴`;
          }

          const status = getRiskStatus(total);
          const lines = [];

          // TIER 1: Score + Status (3-second scan)
          lines.push(`# MergeSignal Scan: Score ${total ?? "—"}/100`);
          lines.push(`${status.emoji} **${status.label}**${recs.length === 0 ? " — No critical issues" : ""}`);
          lines.push("");

          // TIER 2: Actionable recommendations (30-second scan)
          if (recs.length > 0) {
            lines.push(`## 🎯 Recommended actions (${Math.min(3, recs.length)}):`);
            const topRecs = recs.slice(0, 3);
            for (let i = 0; i < topRecs.length; i++) {
              const rec = topRecs[i];
              const meta = getActionMeta(rec);
              const title = String(rec.title ?? "Review dependencies");
              const pkgs = Array.isArray(rec.packages) && rec.packages.length > 0
                ? ` — \`${rec.packages.slice(0, 3).join("\`, \`")}\`${rec.packages.length > 3 ? `, +${rec.packages.length - 3} more` : ""}`
                : "";
              lines.push(`${i + 1}. ${meta.icon} ${title} (${meta.time})${pkgs}`);
            }
            lines.push("");
          } else {
            lines.push("## 🎯 No immediate actions required");
            lines.push("");
          }

          // TIER 3: Details (collapsible)
          lines.push("<details>");
          lines.push("<summary>📈 Risk breakdown (expand)</summary>");
          lines.push("");
          lines.push("| Layer | Score | Status |");
          lines.push("|-------|-------|--------|");
          lines.push(`| Security | ${layers.security ?? "—"} | ${formatLayerStatus(layers.security)} |`);
          lines.push(`| Maintainability | ${layers.maintainability ?? "—"} | ${formatLayerStatus(layers.maintainability)} |`);
          lines.push(`| Ecosystem | ${layers.ecosystem ?? "—"} | ${formatLayerStatus(layers.ecosystem)} |`);
          lines.push(`| Upgrade Impact | ${layers.upgradeImpact ?? "—"} | ${formatLayerStatus(layers.upgradeImpact)} |`);
          lines.push("");

          // Graph insights summary
          if (gi.nodes || gi.maxDepth) {
            const nodes = gi.nodes ?? "—";
            const depth = gi.maxDepth ?? "—";
            const hotspotCount = Array.isArray(gi.hotspots) ? gi.hotspots.length : 0;
            const vulnCount = Array.isArray(gi.vulnerable) ? gi.vulnerable.length : 0;
            lines.push(`**Graph insights**: ${nodes} packages, max depth ${depth}${hotspotCount > 0 ? `, ${hotspotCount} hotspot${hotspotCount > 1 ? "s" : ""}` : ""}${vulnCount > 0 ? `, ${vulnCount} vulnerable` : ""}`);
          }

          lines.push("</details>");

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
          '

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: mergesignal-scan
          path: |
            mergesignal-scan.json
            mergesignal-scan.pretty.json
          if-no-files-found: error
