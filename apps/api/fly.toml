app = "mergesignal-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4000"
  NODE_ENV = "production"
  MERGESIGNAL_AUTO_MIGRATE = "1"
  CORS_ORIGINS = "https://mergesignal-web.fly.dev"
  FREE_SCANS_PER_OWNER_PER_DAY = "25"
  FREE_GITHUB_SCANS_PER_OWNER_PER_DAY = "15"
  FREE_PR_COMMENTS_ENABLED = "1"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 4000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
